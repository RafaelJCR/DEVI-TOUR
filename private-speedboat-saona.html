<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Private Speedboat To Saona</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins", sans-serif;
}
select option{
  color:black; /* los números y texto del dropdown se ven */
}

body{
  background:url("Images/HD-wallpaper-orange-waves-12-background-gradient-iphone-pro-wave-thumbnail.jpg") no-repeat center/cover;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

.booking-container{
  width:95%;
  max-width:1200px;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:60px;
  padding:60px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(16px);
  border-radius:30px;
  box-shadow:0 40px 100px rgba(0,0,0,0.6);
  color:white;
}

.left-side h1{
  font-size:38px;
  font-weight:300;
  margin-bottom:15px;
}

.subtitle{
  opacity:0.8;
  margin-bottom:50px;
}

.booking-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

label{
  font-size:14px;
  opacity:0.8;
  margin-bottom:6px;
  display:block;
}

input, select, textarea{
  width:100%;
  padding:12px 8px;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.4);
  background:transparent;
  color:white;
  font-size:15px;
}

input::placeholder,
textarea::placeholder{
  color:rgba(255,255,255,0.6);
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-bottom:1px solid white;
}

textarea{
  grid-column:span 2;
  height:110px;
  resize:none;
}

.right-side{
  display:flex;
  align-items:center;
  justify-content:center;
}

.tour-card{
  width:100%;
  padding:40px;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:25px;
  backdrop-filter:blur(15px);
  text-align:center;
}

.tour-card h2{
  margin-bottom:20px;
  font-weight:400;
  font-size:26px;
}

.tour-card p{
  font-size:14px;
  line-height:1.7;
  opacity:0.85;
  margin-bottom:25px;
}

.price{
  font-size:32px;
  font-weight:600;
  margin-bottom:25px;
}

.btn-book{
  width:100%;
  padding:16px;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
}

.btn-book:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 50px rgba(37,211,102,0.4);
}

.note{
  margin-top:20px;
  font-size:13px;
  opacity:0.7;
}

/* CENTRADO EN MÓVIL */
@media(max-width:992px){
  .booking-container{
    grid-template-columns:1fr;
    padding:40px 25px;
    margin:0 auto;
  }

  .booking-form{
    grid-template-columns:1fr;
  }

  textarea{
    grid-column:span 1;
  }

  .right-side{
    margin-top:30px;
  }
}
</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">
<h1>🚤 Book Your Excursion</h1>
<p class="subtitle">Private Speedboat To Saona Island</p>

<form class="booking-form" onsubmit="return false;">
<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe" required>
</div>

<div>
<label>Hotel / Accommodation</label>
<input type="text" id="hotelInput" placeholder="Your hotel" required>
<div id="hotelList"></div>
</div>

<div>
<label>Number of People</label>
<select id="people" required>
<option value="">Select</option>
<option>2 People</option>
<option>3 People</option>
<option>4 People</option>
<option>5 People</option>
<option>6+ People</option>
</select>
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date" required>
</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Private group details, celebration, kids, preferences..."></textarea>
</div>
</form>
</div>

<div class="right-side">
<div class="tour-card">
<h2>Private Speedboat To Saona Island</h2>

<p>
Fully private luxury speedboat experience to Saona Island with flexible schedule and exclusive service.
</p>

<div class="price">$1050.00 USD</div>

<!-- PAYPAL BUTTON -->
<div id="paypal-button-container" style="margin-bottom:20px;"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Deposit via PayPal. Remaining balance paid on excursion day.
</p>

</div>
</div>

</div>

<script>
const hotels = [
"Hard Rock Hotel & Casino Punta Cana","Royalton Punta Cana","Royalton Bavaro",
"Royalton Splash Punta Cana","Royalton CHIC Punta Cana","Riu Palace Bavaro",
"Riu Palace Punta Cana","Riu Palace Macao","Riu Bambu","Riu Republica",
"Majestic Mirage Punta Cana","Majestic Elegance Punta Cana","Majestic Colonial Punta Cana",
"Bahia Principe Fantasia","Bahia Principe Grand Bavaro","Bahia Principe Luxury Ambar",
"Barceló Bávaro Palace","Barceló Bávaro Beach","Iberostar Selection Bavaro",
"Iberostar Grand Bavaro","JOIA Bavaro by Iberostar","Dreams Royal Beach","Dreams Macao",
"Secrets Royal Beach","Secrets Cap Cana","Melia Caribe Beach","Paradisus Palma Real",
"Lopesan Costa Bavaro","Ocean Blue & Sand","Ocean El Faro","Grand Palladium Punta Cana",
"Catalonia Bavaro","Excellence Punta Cana","Hyatt Zilara Cap Cana","Hyatt Ziva Cap Cana",
"TRS Cap Cana","Eden Roc Cap Cana","Nickelodeon Punta Cana","Impressive Punta Cana",
"Vista Sol Punta Cana","Santo Domingo Hotel"
];

const input = document.getElementById("hotelInput");
const list = document.getElementById("hotelList");

input.addEventListener("input", () => {
  const value = input.value.toLowerCase().trim();
  list.innerHTML = "";

  if(!value){
    list.style.display="none";
    return;
  }

  hotels.filter(h=>h.toLowerCase().startsWith(value))
        .forEach(hotel=>{
          const div=document.createElement("div");
          div.textContent=hotel;
          div.onclick=()=>{ input.value=hotel; list.style.display="none"; };
          list.appendChild(div);
        });

  list.style.display="block";
});

function sendWhatsApp(){
const message = `
Hello! I would like to confirm my excursion booking.

🚤 Private Speedboat To Saona Island
👤 Name: ${name.value}
🏨 Hotel: ${hotelInput.value}
👥 People: ${people.value}
📅 Date: ${date.value}
📝 Notes: ${notes.value}

💰 Deposit via PayPal
💵 Balance paid on excursion day

Please confirm availability.
`;

window.open("https://wa.me/18090000000?text="+encodeURIComponent(message),"_blank");
}
</script>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>
paypal.Buttons({
style:{
layout:'vertical',
color:'blue',
shape:'pill',
label:'paypal'
},

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{ value:'20.00' },
description:'Private Speedboat To Saona Deposit'
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(function(details){
alert('Payment completed by ' + details.payer.name.given_name);
window.location.href="thank-you.html";
});
}
}).render('#paypal-button-container');
</script>

</body>
</html>
