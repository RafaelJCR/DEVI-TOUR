<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Santo Domingo City Tour</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://denomades.imgix.net/destinos/punta-cana/1160/monumento-cristobal-colon.jpg") no-repeat center/cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CONTAINER */
.booking-container{
width:100%;
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:50px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
color:white;
}

/* TEXT */
.left-side h1{
font-size:clamp(24px,4vw,36px);
font-weight:300;
margin-bottom:10px;
text-align:center;
}

.subtitle{
text-align:center;
margin-bottom:20px;
font-size:clamp(14px,2vw,18px);
}

/* FORM */
.booking-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-size:13px;
opacity:0.8;
margin-bottom:6px;
display:block;
}

input,textarea{
width:100%;
padding:12px 14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
outline:none;
transition:0.3s;
}

input:focus,textarea:focus{
background:rgba(255,255,255,0.15);
}

textarea{
grid-column:span 2;
height:100px;
resize:none;
}

/* TAXI */
.taxi-box{
background:rgba(255,255,255,0.08);
border-radius:10px;
padding:12px;
grid-column:span 2;
}

.taxi-option{
display:flex;
align-items:center;
gap:10px;
font-size:13px;
cursor:pointer;
}

.taxi-option input{
width:20px;
height:20px;
accent-color:#25D366;
}

/* RIGHT SIDE */
.right-side{
display:flex;
align-items:center;
justify-content:center;
}

.tour-card{
width:100%;
padding:25px 20px;
border:1px solid rgba(255,255,255,0.3);
border-radius:20px;
text-align:center;
}

/* PRICE */
.price{
font-size:clamp(22px,4vw,32px);
font-weight:600;
margin-bottom:5px;
color:#f77f00;
}

.deposit{
font-size:clamp(13px,2vw,16px);
margin-bottom:20px;
color:#FFD54F;
}

/* BUTTON */
.btn-book{
width:100%;
padding:12px;
border:none;
border-radius:40px;
background:#25D366;
color:white;
font-size:15px;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

.btn-book:hover{
transform:translateY(-2px);
}

/* NOTE */
.note{
margin-top:15px;
font-size:12px;
opacity:0.7;
}

/* TABLET */
@media(max-width:992px){

.booking-container{
grid-template-columns:1fr;
gap:40px;
padding:30px;
}

.booking-form{
grid-template-columns:1fr;
}

textarea{
grid-column:span 1;
}

.taxi-box{
grid-column:span 1;
}

}

/* MOBILE */
@media(max-width:600px){

body{
padding:10px;
}

.booking-container{
padding:20px;
border-radius:20px;
gap:25px;
}

.booking-form{
gap:15px;
}

.price{
font-size:22px;
}

.deposit{
font-size:13px;
}

.btn-book{
font-size:14px;
}

.note{
font-size:11px;
}

}

.btn-back{
display:inline-block;
margin-bottom:20px;
padding:10px 20px;
background:rgba(255,255,255,0.15);
color:white;
text-decoration:none;
border-radius:30px;
font-size:14px;
transition:0.3s;
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(8px);
}

.btn-back:hover{
background:white;
color:black;
transform:translateY(-2px);
}

@media (max-width: 768px){

.booking-container{
grid-template-columns:1fr;
gap:30px;
padding:25px;
}

.booking-form{
grid-template-columns:1fr;
}

textarea{
grid-column:span 1;
}

.left-side h1{
font-size:26px;
}

.price{
font-size:26px;
}

}

@media (max-width: 450px){

.booking-container{
padding:18px;
gap:20px;
border-radius:18px;
}

.left-side h1{
font-size:22px;
}

.tour-description{
font-size:13px;
}

input, textarea{
padding:12px;
font-size:14px;
}

.price{
font-size:22px;
}

.btn-book{
font-size:14px;
padding:12px;
}

}

</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">

<a href="index.html" class="btn-back">⬅ Back to Home</a>

<h1>🏛️ Book Your Excursion</h1>
<p class="subtitle">Santo Domingo City Tour</p>

<form class="booking-form">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div>
<label>Hotel / Pickup Location</label>
<input type="text" id="hotelInput" placeholder="Hotel / Pickup Location">
</div>

<div>
<label>Adults (9+ years) — $55</label>
<input type="number" id="adults" value="1" min="0" oninput="updateTotal()">
</div>

<div>
<label>Kids 4-8 years — $45</label>
<input type="number" id="kids" value="0" min="0" oninput="updateTotal()">
</div>

<div>
<label>Kids 0-3 years — Free</label>
<input type="number" id="babies" value="0" min="0">
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date">
</div>

<div class="taxi-box">

<label>Additional services</label>

<label class="taxi-option">
<input type="checkbox" id="taxiService" onchange="updateTotal()">
Taxi Service. Only for hotels located in Bayahibe (+$30 USD)
</label>

</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, special requests, room number..."></textarea>
</div>

</form>

</div>

<div class="right-side">

<div class="tour-card">

<h2>Santo Domingo City Tour</h2>

<div class="price" id="total">$55 USD</div>

<div class="deposit" id="deposit">$20 deposit per person</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Full payment via PayPal. Confirmation will be sent shortly.
</p>

</div>

</div>

</div>

<script>

let depositAmount = 20

function updateTotal(){

let adults=parseInt(document.getElementById("adults").value) || 0
let kids=parseInt(document.getElementById("kids").value) || 0
let taxi=document.getElementById("taxiService").checked

let total=(adults*55)+(kids*45)

if(taxi){
total+=30
}

depositAmount=(adults+kids)*20

document.getElementById("total").innerHTML="$"+total+" USD"

document.getElementById("deposit").innerHTML="$"+depositAmount+" deposit today ($20 per person)"

}

updateTotal()

function sendWhatsApp(){

let adults=document.getElementById("adults").value
let kids=document.getElementById("kids").value
let babies=document.getElementById("babies").value
let taxi=document.getElementById("taxiService").checked ? "Yes (+$30)" : "No"

let total=document.getElementById("total").innerText
let deposit=document.getElementById("deposit").innerText
const taxiChecked = document.getElementById("taxiService");
const taxiText = taxiChecked && taxiChecked.checked ? "Yes" : "No";

const message=`Hello! I would like to confirm my Santo Domingo City Tour booking.

Name: ${document.getElementById("name").value}
Hotel: ${document.getElementById("hotelInput").value}

Adults: ${adults}
Kids 4-8: ${kids}
Kids 0-3: ${babies}

Date: ${document.getElementById("date").value}

Total: ${total}
Deposit: ${deposit}
Taxi Service: ${taxiText}

Notes: ${document.getElementById("notes").value}

Payment via PayPal completed.`

window.open("https://wa.me/18097980816?text="+encodeURIComponent(message),"_blank")

}

</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>

paypal.Buttons({

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{value: document.getElementById("total").innerText.replace(/[^0-9]/g,'') + '.00'},
description:'Santo Domingo City Tour'
}]
})
},

onApprove:function(data,actions){
return actions.order.capture().then(function(details){
alert("Payment completed by "+details.payer.name.given_name)
})
}

}).render('#paypal-button-container')

</script>

</body>
</html>
