<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Santo Domingo City Tour</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}

body{
background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://denomades.imgix.net/destinos/punta-cana/1160/monumento-cristobal-colon.jpg") no-repeat center/cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.booking-container{
width:95%;
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:50px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
color:white;
}

.left-side h1{
font-size:36px;
font-weight:300;
margin-bottom:10px;
text-align:center;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

.booking-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

label{
font-size:14px;
opacity:0.8;
margin-bottom:6px;
display:block;
}

input,textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
outline:none;
}

textarea{
grid-column:span 2;
height:100px;
}

.right-side{
display:flex;
align-items:center;
justify-content:center;
}

.tour-card{
width:100%;
padding:30px;
border:1px solid rgba(255,255,255,0.3);
border-radius:25px;
text-align:center;
}

.price{
font-size:32px;
font-weight:600;
margin-bottom:5px;
color:#f77f00;
}

.deposit{
font-size:16px;
margin-bottom:20px;
color:#FFD54F;
}

.btn-book{
width:100%;
padding:14px;
border:none;
border-radius:40px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.note{
margin-top:15px;
font-size:13px;
opacity:0.7;
}

.taxi-box{
background:rgba(255,255,255,0.08);
border-radius:12px;
padding:14px 16px;
display:flex;
flex-direction:column;
justify-content:center;
}

.taxi-option{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
cursor:pointer;
}

.taxi-option input{
width:24px;
height:24px;
cursor:pointer;
accent-color:#25D366;
}

</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">

<h1>🏛️ Book Your Excursion</h1>
<p class="subtitle">Santo Domingo City Tour</p>

<form class="booking-form">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div>
<label>Hotel / Pickup Location</label>
<input type="text" id="hotelInput" placeholder="Hotel / Pickup Location">
</div>

<div>
<label>Adults (9+ years) — $55</label>
<input type="number" id="adults" value="1" min="0" oninput="updateTotal()">
</div>

<div>
<label>Kids 4-8 years — $45</label>
<input type="number" id="kids" value="0" min="0" oninput="updateTotal()">
</div>

<div>
<label>Kids 0-3 years — Free</label>
<input type="number" id="babies" value="0" min="0">
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date">
</div>

<div class="taxi-box">

<label>Additional services</label>

<label class="taxi-option">
<input type="checkbox" id="taxiService" onchange="updateTotal()">
Taxi Service. Only for hotels located in Bayahibe (+$30 USD)
</label>

</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, special requests, room number..."></textarea>
</div>

</form>

</div>

<div class="right-side">

<div class="tour-card">

<h2>Santo Domingo City Tour</h2>

<div class="price" id="total">$55 USD</div>

<div class="deposit" id="deposit">$20 deposit per person</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Deposit via PayPal. Remaining balance paid on excursion day.
</p>

</div>

</div>

</div>

<script>

let depositAmount = 20

function updateTotal(){

let adults=parseInt(document.getElementById("adults").value) || 0
let kids=parseInt(document.getElementById("kids").value) || 0
let taxi=document.getElementById("taxiService").checked

let total=(adults*55)+(kids*45)

if(taxi){
total+=30
}

depositAmount=(adults+kids)*20

document.getElementById("total").innerHTML="$"+total+" USD"

document.getElementById("deposit").innerHTML="$"+depositAmount+" deposit today ($20 per person)"

}

updateTotal()

function sendWhatsApp(){

let adults=document.getElementById("adults").value
let kids=document.getElementById("kids").value
let babies=document.getElementById("babies").value
let taxi=document.getElementById("taxiService").checked ? "Yes (+$30)" : "No"

let total=document.getElementById("total").innerText

const message=`Hello! I would like to confirm my Santo Domingo City Tour booking.

Name: ${document.getElementById("name").value}
Hotel: ${document.getElementById("hotelInput").value}

Adults: ${adults}
Kids 4-8: ${kids}
Kids 0-3: ${babies}

Date: ${document.getElementById("date").value}

Taxi Service: ${taxi}

Total: ${total}

Notes: ${document.getElementById("notes").value}

Deposit via PayPal completed.`

window.open("https://wa.me/18090000000?text="+encodeURIComponent(message),"_blank")

}

</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>

paypal.Buttons({

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{value: depositAmount.toString()},
description:'Santo Domingo City Tour Deposit'
}]
})
},

onApprove:function(data,actions){
return actions.order.capture().then(function(details){
alert("Payment completed by "+details.payer.name.given_name)
})
}

}).render('#paypal-button-container')

</script>

</body>
</html>
