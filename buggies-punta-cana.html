<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Excursion | Buggies Punta Cana</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  min-height: 100vh;
  background:
    linear-gradient(rgba(255,200,80,0.35), rgba(0,180,216,0.45)),
    url("Images/buggies.jpg") center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

.booking-container {
  background: rgba(255,255,255,0.97);
  max-width: 820px;
  width: 100%;
  padding: 35px;
  border-radius: 22px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.3);
}

h1 { text-align:center; color:#0077b6; }

.booking-form {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:30px;
}

input, select, textarea {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

textarea { grid-column: span 2; resize:none; height:90px; }

.full-width { grid-column: span 2; }

.hotel-box { position:relative; }

#hotelList {
  position:absolute;
  width:100%;
  background:#fff;
  border:1px solid #ccc;
  border-radius:8px;
  max-height:180px;
  overflow-y:auto;
  display:none;
  z-index:10;
}

#hotelList div { padding:10px; cursor:pointer; }
#hotelList div:hover { background:#f1f1f1; }

.price-box {
  background:#f1faff;
  border-radius:16px;
  padding:18px;
  margin:25px 0;
  display:flex;
  justify-content:space-between;
}

.price { font-size:20px; font-weight:bold; color:#f77f00; }

.btn-whatsapp {
  width:100%;
  padding:16px;
  border-radius:35px;
  background:#25D366;
  color:white;
  font-weight:bold;
  border:none;
  cursor:pointer;
  margin-top:15px;
}

/* ADMIN PANEL */
.admin-panel{
  display:none;
  background:white;
  padding:30px;
  width:95%;
  max-width:1000px;
  border-radius:20px;
}

.admin-panel table{
  width:100%;
  border-collapse:collapse;
}

.admin-panel th, .admin-panel td{
  padding:10px;
  border-bottom:1px solid #ddd;
}

.admin-panel th{
  background:#0077b6;
  color:white;
}
</style>
</head>
<body>

<!-- BOOKING SECTION -->
<div class="booking-container" id="bookingSection">

<h1>📍 Book Your Excursion</h1>

<form class="booking-form" onsubmit="return false;">

<div>
<label>Full Name *</label>
<input type="text" id="name">
</div>

<div class="hotel-box">
<label>Hotel *</label>
<input type="text" id="hotelInput">
<div id="hotelList"></div>
</div>

<div>
<label>Number of People</label>
<select id="people">
<option>1 Person</option>
<option>2 People</option>
<option>3 People</option>
<option>4 People</option>
<option>5+ People</option>
</select>
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date">
</div>

<div class="full-width">
<label>Additional Information</label>
<textarea id="notes"></textarea>
</div>

</form>

<div class="price-box">
<div>Buggies Adventure Tour</div>
<div class="price">$90 USD</div>
</div>

<h3>Pay Deposit</h3>
<div id="paypal-button-container"></div>

<button class="btn-whatsapp" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
<h2>Reservations - Admin Panel</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Hotel</th>
<th>People</th>
<th>Date</th>
<th>Deposit</th>
</tr>
</thead>
<tbody id="adminTable"></tbody>
</table>
</div>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=TU_CLIENT_ID_AQUI&currency=USD"></script>

<script>
let depositAmount = 20;

/* DEPOSIT DYNAMIC */
document.getElementById("people").addEventListener("change",function(){
const val=this.value;
if(val.includes("1")) depositAmount=20;
else if(val.includes("2")) depositAmount=40;
else if(val.includes("3")) depositAmount=60;
else if(val.includes("4")) depositAmount=80;
else depositAmount=100;
});

/* HOTEL SEARCH FULL LIST */
const hotels=[
"Hard Rock Hotel & Casino Punta Cana","Royalton Punta Cana","Royalton Bavaro",
"Royalton Splash Punta Cana","Royalton CHIC Punta Cana",
"Riu Palace Bavaro","Riu Palace Punta Cana","Riu Palace Macao","Riu Bambu","Riu Republica",
"Majestic Mirage Punta Cana","Majestic Elegance Punta Cana","Majestic Colonial Punta Cana",
"Bahia Principe Fantasia","Bahia Principe Grand Bavaro","Bahia Principe Luxury Ambar",
"Barceló Bávaro Palace","Barceló Bávaro Beach",
"Iberostar Selection Bavaro","Iberostar Grand Bavaro","JOIA Bavaro by Iberostar",
"Dreams Royal Beach","Dreams Macao","Secrets Royal Beach","Secrets Cap Cana",
"Melia Caribe Beach","Paradisus Palma Real","Lopesan Costa Bavaro",
"Ocean Blue & Sand","Ocean El Faro",
"Grand Palladium Punta Cana","Catalonia Bavaro","Excellence Punta Cana",
"Hyatt Zilara Cap Cana","Hyatt Ziva Cap Cana","TRS Cap Cana","Eden Roc Cap Cana",
"Nickelodeon Punta Cana","Impressive Punta Cana","Vista Sol Punta Cana"
];

const input=document.getElementById("hotelInput");
const list=document.getElementById("hotelList");

input.addEventListener("input",()=>{
const value=input.value.toLowerCase();
list.innerHTML="";
if(!value){ list.style.display="none"; return; }

hotels.filter(h=>h.toLowerCase().includes(value))
.forEach(h=>{
const div=document.createElement("div");
div.textContent=h;
div.onclick=()=>{ input.value=h; list.style.display="none"; };
list.appendChild(div);
});
list.style.display="block";
});

/* PAYPAL */
paypal.Buttons({

createOrder:function(data,actions){

if(!name.value || !hotelInput.value){
alert("Name and Hotel are required.");
return;
}

return actions.order.create({
purchase_units:[{
amount:{ value: depositAmount.toString() },
description:"Buggies Tour Deposit"
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(function(details){
saveReservation();
alert("Payment completed!");
});
}

}).render('#paypal-button-container');

/* SAVE RESERVATION */
function saveReservation(){
const reservation={
name:name.value,
hotel:hotelInput.value,
people:people.value,
date:date.value,
deposit:depositAmount
};

let reservations=JSON.parse(localStorage.getItem("reservations"))||[];
reservations.push(reservation);
localStorage.setItem("reservations",JSON.stringify(reservations));
}

/* WHATSAPP */
function sendWhatsApp(){
const message=`
Reservation Confirmation

Name: ${name.value}
Hotel: ${hotelInput.value}
People: ${people.value}
Date: ${date.value}
`;
window.open("https://wa.me/18097980816?text="+encodeURIComponent(message));
}

/* ADMIN VIEW */
if(window.location.hash==="#admin"){
document.getElementById("bookingSection").style.display="none";
document.getElementById("adminPanel").style.display="block";
loadAdmin();
}

function loadAdmin(){
let reservations=JSON.parse(localStorage.getItem("reservations"))||[];
const table=document.getElementById("adminTable");
table.innerHTML="";
reservations.forEach(res=>{
table.innerHTML+=`
<tr>
<td>${res.name}</td>
<td>${res.hotel}</td>
<td>${res.people}</td>
<td>${res.date}</td>
<td>$${res.deposit}</td>
</tr>`;
});
}
</script>

</body>
</html>
