<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buggies Adventure Booking</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  background:url("Images/HD-wallpaper-orange-waves-12-background-gradient-iphone-pro-wave-thumbnail.jpg") no-repeat center center/cover;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.booking-container{
  width:100%;
  max-width:1100px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
  padding:40px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(14px);
  border-radius:30px;
  box-shadow:0 40px 90px rgba(0,0,0,0.5);
  color:white;
  justify-items:center; /* centra las columnas */
  align-items:center;   /* centra verticalmente los items dentro de la grid */
  text-align:center;    /* centra todos los textos dentro */
}

.left-side h1, .left-side p, .tour-card h2, .tour-card p, .tour-card .price, .tour-card .note {
  text-align:center;
}

.left-side h1{
  font-size:36px;
  font-weight:300;
  margin-bottom:15px;
}

.subtitle{
  opacity:0.8;
  margin-bottom:40px;
}

.booking-form{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
  justify-items:center; /* centra los inputs */
}

label{
  font-size:14px;
  opacity:0.8;
  margin-bottom:6px;
  display:block;
}

input, select, textarea{
  width:100%;
  max-width:320px;
  padding:12px 10px;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.4);
  background:transparent;
  color:white;
  font-size:15px;
  text-align:center; /* centramos el texto dentro del input */
}
select option{
  color:black; /* los números y texto del dropdown se ven */
}
input::placeholder,
textarea::placeholder{
  color:rgba(255,255,255,0.6);
  text-align:center;
}

input:focus, select:focus, textarea:focus{
  outline:none;
  border-bottom:1px solid white;
}

textarea{
  height:100px;
  resize:none;
}

.right-side{
  display:flex;
  justify-content:center;
  align-items:center;
}

.tour-card{
  width:100%;
  max-width:400px;
  padding:30px;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:25px;
  backdrop-filter:blur(12px);
}

.tour-card h2{
  margin-bottom:15px;
  font-weight:400;
}

.tour-card p{
  font-size:14px;
  line-height:1.6;
  opacity:0.85;
  margin-bottom:20px;
}

.price{
  font-size:28px;
  font-weight:600;
  margin-bottom:20px;
  color:#f77f00;
}

.btn-book{
  width:100%;
  max-width:320px;
  padding:16px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
  text-align:center;
}

.btn-book:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(37,211,102,0.4);
}

.note{
  margin-top:20px;
  font-size:13px;
  opacity:0.7;
}

@media(max-width:992px){
  .booking-container{
    grid-template-columns:1fr;
    padding:30px 20px;
  }

  .booking-form{
    grid-template-columns:1fr;
  }

  textarea{
    grid-column:span 1;
  }
}
</style>
</head>

<body>

<div class="booking-container">

  <div class="left-side">
    <h1>🏎️ Book Your Buggies Adventure</h1>
    <p class="subtitle">Punta Cana Off-Road Experience</p>

    <form class="booking-form" onsubmit="return false;">

      <div>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe">
      </div>

      <div>
        <label>Hotel</label>
        <input type="text" id="hotelInput" placeholder="Your hotel">
      </div>

      <div>
        <label>Number of People</label>
        <select id="people">
          <option>1 Person</option>
          <option>2 People</option>
          <option>3 People</option>
          <option>4 People</option>
          <option>5+ People</option>
        </select>
      </div>

      <div>
        <label>Excursion Date</label>
        <input type="date" id="date">
      </div>

      <div>
        <label>Additional Information</label>
        <textarea id="notes" placeholder="Special requests..."></textarea>
      </div>

    </form>
  </div>

  <div class="right-side">
    <div class="tour-card">

      <h2>Buggies Adventure Tour</h2>

      <p>
        Drive through muddy trails, explore caves and enjoy the most exciting
        off-road experience in Punta Cana.
      </p>

      <div class="price">$90 USD</div>

      <!-- PAYPAL BUTTON -->
      <div id="paypal-button-container"></div>

      <button class="btn-book" onclick="sendWhatsApp()">
        Confirm Reservation via WhatsApp
      </button>

      <p class="note">
        Deposit via PayPal. Remaining balance paid on tour day.
      </p>

    </div>
  </div>

</div>

<!-- PAYPAL SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>
paypal.Buttons({
  style:{ layout:'vertical', color:'blue', shape:'pill', label:'paypal' },

  createOrder: function(data, actions){
    return actions.order.create({
      purchase_units:[{
        amount:{ value:'20.00' },
        description:'Buggies Adventure Deposit'
      }]
    });
  },

  onApprove: function(data, actions){
    return actions.order.capture().then(function(details){
      alert('Payment completed by ' + details.payer.name.given_name);
    });
  }

}).render('#paypal-button-container');

function sendWhatsApp(){
  const message = `
Hello! I would like to confirm my Buggies Adventure booking.

Name: ${name.value}
Hotel: ${hotelInput.value}
People: ${people.value}
Date: ${date.value}

Deposit via PayPal completed.
Please confirm pickup time.
`;
  window.open("https://wa.me/18097980816?text="+encodeURIComponent(message),"_blank");
}
</script>

</body>
</html>
