<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Excursion | Zip Line Punta Cana</title>

<style>
body{
  margin:0;
  font-family:"Poppins", Arial, sans-serif;
  background:#f4f4f4;
}

.hero-img{
  width:100%;
  height:280px;
  background:url("Images/zipline.jpg") center/cover no-repeat;
  border-radius:20px 20px 0 0;
}

.booking-container{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  overflow:hidden;
}

.content{
  padding:30px;
}

h1{
  color:#0077b6;
  text-align:center;
}

.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:25px;
}

.booking-form{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:40px;
}

label{
  font-weight:600;
}

input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

textarea{
  grid-column:span 2;
  height:90px;
}

.full{
  grid-column:span 2;
}

.price-box{
  background:#f1faff;
  border-radius:16px;
  padding:18px;
  margin:25px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.excursion-name{
  font-weight:bold;
  color:#023e8a;
  font-size:18px;
}

.price{
  font-size:22px;
  font-weight:bold;
  color:#f77f00;
}

.old-price{
  text-decoration:line-through;
  color:#888;
  font-size:14px;
}

.btn-whatsapp{
  width:100%;
  padding:16px;
  border-radius:35px;
  border:none;
  font-weight:bold;
  color:white;
  background:#25D366;
  cursor:pointer;
  margin-top:15px;
}

@media(max-width:768px){
  .booking-form{
    grid-template-columns:1fr;
  }
  textarea, .full{
    grid-column:span 1;
  }
}

body{
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  background: linear-gradient(
    to bottom,
    #87ceeb 0%,
    #a8e0f9 40%,
    #ffffff 100%
  );
}
</style>
</head>

<body>

<div class="booking-container">

<div class="hero-img"></div>

<div class="content">

<h1>📍 Zip Line Punta Cana</h1>
<p class="subtitle">Fly over the jungle with breathtaking views</p>

<form class="booking-form">

<div>
<label>Full Name</label>
<input type="text" placeholder="Group leader name" id="name" required>
</div>

<div>
<label>Hotel</label>
<input type="text" placeholder="Start typing your hotel..."  id="hotelInput" required>
</div>

<div>
<label>Number of People</label>
<select id="people" required>
<option value="">Select</option>
<option value="1">1 Person</option>
<option value="2">2 People</option>
<option value="3">3 People</option>
<option value="4">4 People</option>
<option value="5">5 People</option>
</select>
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date" required>
</div>

<div class="full">
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, special requests, celebrations..."></textarea>
</div>

</form>

<div class="price-box">
<div>
<div class="excursion-name">Zip Line Punta Cana</div>
<small>All equipment included · Hotel pickup</small><br>
<span class="old-price">$120.00</span>
</div>
<div class="price">$60.00 USD</div>
</div>

<!-- Boton de pasarela de pago -->
<div style="max-width:500px; margin:40px auto;">
  <div id="paypal-button-container"></div>
</div>
<!-- Boton de pasarela de pago -->

<p style="text-align:center;font-size:13px;">
Deposit required today. Remaining balance due on tour day.
</p>

<button class="btn-whatsapp" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

</div>
</div>

<script>
function sendWhatsApp(){
  const message = `
Hello! I would like to confirm my excursion booking.

📍 Zip Line Punta Cana
👤 Name: ${name.value}
🏨 Hotel: ${hotelInput.value}
👥 People: ${people.value}
📅 Date: ${date.value}

Deposit paid via PayPal.
Please confirm pickup time.
`;

  window.open(
    "https://wa.me/18097980816?text=" + encodeURIComponent(message),
    "_blank"
  );
}
</script>

<!-- Pasarela de pago -->
<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>
  paypal.Buttons({
    style: {
      layout: 'vertical',
      color: 'blue',
      shape: 'pill',
      label: 'paypal'
    },

    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: {
            value: '20.00'
          },
          description: 'Santo Domingo City Tour Deposit'
        }]
      });
    },

    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Payment completed by ' + details.payer.name.given_name);
        
        // Aquí luego podemos mandar los datos del formulario
        window.location.href = "thank-you.html";
      });
    }

  }).render('#paypal-button-container');
</script>
<!-- Pasarela de pago -->

</body>
</html>
