<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Saona Island</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  background:url("Images/HD-wallpaper-orange-waves-12-background-gradient-iphone-pro-wave-thumbnail.jpg") no-repeat center/cover;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:20px;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:-1;
}

.booking-container{
  width:95%;
  max-width:1200px;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:60px;
  padding:50px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  border-radius:30px;
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
  color:white;
  align-items:center;
  justify-items:center;
}

.left-side, .right-side{
  width:100%;
}

.left-side h1{
  font-size:36px;
  font-weight:300;
  margin-bottom:10px;
  text-align:center;
}

.subtitle{
  opacity:0.85;
  margin-bottom:40px;
  text-align:center;
}

.booking-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

label{
  font-size:14px;
  opacity:0.8;
  margin-bottom:6px;
  display:block;
}

input, select, textarea{
  width:100%;
  padding:12px 10px;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.4);
  background:transparent;
  color:white;
  font-size:15px;
  border-radius:4px;
}

input::placeholder,
textarea::placeholder{ color:rgba(255,255,255,0.6); }

input:focus, select:focus, textarea:focus{ border-bottom:1px solid white; outline:none; }

textarea{ grid-column:span 2; height:100px; resize:none; }

.right-side{
  display:flex;
  align-items:center;
  justify-content:center;
}

.tour-card{
  width:100%;
  padding:30px 25px;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:25px;
  backdrop-filter:blur(12px);
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.tour-card h2{
  margin-bottom:20px;
  font-weight:400;
}

.tour-card p{
  font-size:14px;
  line-height:1.6;
  opacity:0.85;
  margin-bottom:25px;
}

.price{
  font-size:28px;
  font-weight:600;
  margin-bottom:25px;
}

.private-badge{
  background:#ffd166;
  padding:4px 12px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  margin-left:10px;
  color:#000;
}

.btn-book{
  width:100%;
  max-width:300px;
  padding:14px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
}

.btn-book:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(37,211,102,0.4);
}

.note{ margin-top:15px; font-size:13px; opacity:0.7; }

#hotelList{
  position:absolute;
  width:100%;
  background:#fff;
  color:#000;
  border-radius:8px;
  max-height:180px;
  overflow-y:auto;
  display:none;
  z-index:10;
}

#hotelList div{ padding:10px; cursor:pointer; }
#hotelList div:hover{ background:#f1f1f1; }

select option{ color:black; }

@media(max-width:992px){
  .booking-container{
    grid-template-columns:1fr;
    padding:30px 20px;
  }
  .booking-form{ grid-template-columns:1fr; }
  textarea{ grid-column:span 1; }
  .tour-card{ margin-top:30px; }
}
</style>
</head>

<body>

<div class="booking-container">

  <div class="left-side">
    <h1>🛥️ Book Your Excursion</h1>
    <p class="subtitle"></p>

    <form class="booking-form" onsubmit="return false;">
      <div>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe">
      </div>

      <div class="hotel-box">
        <label>Hotel / Pickup Location</label>
        <input type="text" id="hotelInput" placeholder="Start typing hotel...">
        <div id="hotelList"></div>
      </div>

      <div>
        <label>Number of People</label>
        <select id="people"></select>
      </div>

      <div>
        <label>Excursion Date</label>
        <input type="date" id="date">
      </div>

      <div>
        <label>Additional Information</label>
        <textarea id="notes" placeholder="Special requests..."></textarea>
      </div>
    </form>
  </div>

  <div class="right-side">
    <div class="tour-card">
      <h2></h2>
      <p></p>
      <div class="price"></div>
      <div id="paypal-button-container"></div>
      <button class="btn-book" onclick="sendWhatsApp()">Confirm Booking via WhatsApp</button>
      <p class="note">Deposit via PayPal. Remaining balance paid on excursion day.</p>
    </div>
  </div>

</div>

<script>
const tour = {
  name: "Saona Island – Private Boat",
  description: "Full-day private boat experience to Saona Island with drinks, music, lunch, and transport included. Perfect for groups, celebrations, or special occasions.",
  price: "2600",
  peopleOptions: ["1","2","3","4","5+"],
  isPrivate:true
};

const hotels = [
"Hard Rock Hotel & Casino Punta Cana","Royalton Punta Cana","Royalton Bavaro","Royalton Splash Punta Cana",
"Royalton CHIC Punta Cana","Riu Palace Bavaro","Riu Palace Punta Cana","Riu Palace Macao","Riu Bambu",
"Riu Republica","Majestic Mirage Punta Cana","Majestic Elegance Punta Cana","Majestic Colonial Punta Cana",
"Bahia Principe Fantasia","Bahia Principe Grand Bavaro","Bahia Principe Luxury Ambar","Barceló Bávaro Palace",
"Barceló Bávaro Beach","Iberostar Selection Bavaro","Iberostar Grand Bavaro","JOIA Bavaro by Iberostar",
"Dreams Royal Beach","Dreams Macao","Secrets Royal Beach","Secrets Cap Cana","Melia Caribe Beach",
"Paradisus Palma Real","Lopesan Costa Bavaro","Ocean Blue & Sand","Ocean El Faro",
"Grand Palladium Punta Cana","Catalonia Bavaro","Excellence Punta Cana","Hyatt Zilara Cap Cana",
"Hyatt Ziva Cap Cana","TRS Cap Cana","Eden Roc Cap Cana","Nickelodeon Punta Cana","Impressive Punta Cana",
"Vista Sol Punta Cana","Santo Domingo Hotel"
];

// ======= Set tour info =======
document.title = `Book Excursion | ${tour.name}`;
document.querySelector(".subtitle").innerText = tour.name;

const h2 = document.querySelector(".tour-card h2");
h2.innerText = tour.name + (tour.isPrivate ? ' ' : '');
if(tour.isPrivate){ h2.innerHTML += '<span class="private-badge">PRIVATE</span>'; }

document.querySelector(".tour-card p").innerText = tour.description;
document.querySelector(".tour-card .price").innerText = `$${tour.price} USD` + (tour.isPrivate ? ' / Group' : '');

// ======= Populate people options =======
const peopleSelect = document.getElementById("people");
peopleSelect.innerHTML = "";
tour.peopleOptions.forEach(opt=>{
  const option = document.createElement("option");
  option.textContent = opt;
  peopleSelect.appendChild(option);
});

// ======= Hotel autocomplete =======
const input = document.getElementById("hotelInput");
const list = document.getElementById("hotelList");
input.addEventListener("input", () => {
  const value = input.value.toLowerCase().trim();
  list.innerHTML = "";
  if(!value){ list.style.display="none"; return; }
  hotels.filter(h => h.toLowerCase().startsWith(value[0])).forEach(h=>{
    const div = document.createElement("div");
    div.textContent = h;
    div.onclick = () => { input.value = h; list.style.display="none"; };
    list.appendChild(div);
  });
  list.style.display="block";
});

// ======= WhatsApp message =======
function sendWhatsApp(){
  const message = `Hello! I would like to book ${tour.name}.
Group Leader: ${name.value}
Hotel: ${hotelInput.value}
People: ${people.value}
Date: ${date.value}
Notes: ${notes.value}
Deposit via PayPal completed.
Please confirm pickup time and full quote.`;
  window.open("https://wa.me/18090000000?text="+encodeURIComponent(message),"_blank");
}
</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>
<script>
paypal.Buttons({
  style:{layout:'vertical',color:'blue',shape:'pill',label:'paypal'},
  createOrder:function(data,actions){
    return actions.order.create({ purchase_units:[{ amount:{value: tour.price}, description:`${tour.name} Deposit` }] });
  },
  onApprove:function(data,actions){
    return actions.order.capture().then(details=>{ alert('Payment completed by '+details.payer.name.given_name); });
  }
}).render('#paypal-button-container');
</script>

</body>
</html>
