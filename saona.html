<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Saona Island Catamaran & Speed Boat</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}

body{
background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://media.istockphoto.com/id/1315005752/es/foto/paradise-fondo-de-la-naturaleza-de-la-isla-tropical-vista-a%C3%A9rea-de-drones-de-la-hermosa-playa.jpg?s=612x612&w=0&k=20&c=NpOC9sTz_xuxecAguuZxdvNO-ohqjEfFK4rJkaiioRo=") no-repeat center center/cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.booking-container{
width:95%;
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:50px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
color:white;
}

.booking-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

label{font-size:14px;margin-bottom:5px;display:block;}

input,select,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
}

textarea{grid-column:span 2;}

.tour-card{
padding:30px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.3);
text-align:center;
}

.price{
font-size:28px;
color:#f77f00;
margin:20px 0;
}

.btn-book{
width:100%;
padding:14px;
border:none;
border-radius:40px;
background:#25D366;
color:white;
font-size:16px;
cursor:pointer;
margin-top:15px;
}
/* MOBILE FIX */
@media (max-width: 768px){

.booking-container{
grid-template-columns:1fr;
gap:30px;
padding:25px;
}

.booking-form{
grid-template-columns:1fr;
gap:20px;
}

textarea{
grid-column:span 1;
}

.tour-card{
margin-top:10px;
padding:25px;
}

.tour-card h2{
font-size:22px;
}

.price{
font-size:24px;
}

.btn-book{
width:100%;
}

}
/* INPUTS Y SELECT */
input, select, textarea{
width:100%;
padding:14px 16px;
border:none;
border-radius:12px;
background:#ffffff;   /* fondo blanco */
color:#111;           /* texto oscuro */
font-size:15px;
outline:none;
transition:0.3s;
}

/* OPCIONES DEL SELECT */
select option{
background:white;
color:black;
}

/* PLACEHOLDER */
input::placeholder,
textarea::placeholder{
color:#666;
}

/* CUANDO SE SELECCIONA */
input:focus, select:focus, textarea:focus{
box-shadow:0 0 0 2px rgba(255,255,255,0.4);
}.btn-back{
display:inline-block;
margin-bottom:20px;
padding:10px 20px;
background:rgba(255,255,255,0.15);
color:white;
text-decoration:none;
border-radius:30px;
font-size:14px;
transition:0.3s;
border:1px solid rgba(255,255,255,0.3);
}

.btn-back:hover{
background:white;
color:black;
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="booking-container">

<div>


<a href="index.html" class="btn-back">⬅ Back to Home</a>
<h1>🛥️ Book Your Excursion</h1>

<form class="booking-form">

<div>
<label>Full Name</label>
<input type="text" id="name">
</div>

<div>
<label>Hotel</label>
<input type="text" id="hotelInput">
</div>

<div>
<label>Adults (9+) $55</label>
<select id="adults">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>
</div>

<div>
<label>Children (4-8) $45</label>
<select id="children">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>
</div>

<div>
<label>Babies (0-3) Free</label>
<select id="babies">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>
</div>

<div>
<label>Date</label>
<input type="date" id="date">
</div>

<div>
<label>Notes</label>
<textarea id="notes"></textarea>
</div>

</form>

</div>

<div class="tour-card">

<h2>Saona Island – Catamaran & Speed Boat</h2>

<p>Full-day excursion including natural pool, Saona Island beach and catamaran party.</p>

<div class="price" id="totalPrice">$0 USD</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">Confirm Reservation via WhatsApp</button>

</div>

</div>

<script>

const adultPrice=55;
const childPrice=45;

const adults=document.getElementById("adults");
const children=document.getElementById("children");
const babies=document.getElementById("babies");
const totalPrice=document.getElementById("totalPrice");

function updatePrice(){

let total=(adults.value*adultPrice)+(children.value*childPrice);

totalPrice.innerText="$"+total+" USD";

}

adults.addEventListener("change",updatePrice);
children.addEventListener("change",updatePrice);
babies.addEventListener("change",updatePrice);

updatePrice();

function sendWhatsApp(){

let message=`Hello! I would like to book Saona Island.

Name: ${name.value}
Hotel: ${hotelInput.value}

Adults: ${adults.value}
Children: ${children.value}
Babies: ${babies.value}

Total Price: ${totalPrice.innerText}

Date: ${date.value}

Notes: ${notes.value}`;

window.open("https://wa.me/18090000000?text="+encodeURIComponent(message));

}

</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>

paypal.Buttons({

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{value:'20.00'},
description:'Saona Island Deposit'
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(function(details){
alert("Payment completed by "+details.payer.name.given_name);
});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
