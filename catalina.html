<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Catalina Island & Snorkeling</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}

body{
background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url("https://res.cloudinary.com/simpleview/image/upload/v1548270991/clients/catalinaislandccvb/TwoBoysSnorkeling_22c65f85-64d1-445d-9afc-e06fb9e7a7d8.jpg") no-repeat center/cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.booking-container{
width:95%;
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:50px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
color:white;
}

.left-side,.right-side{width:100%;}

.left-side h1{
font-size:36px;
font-weight:300;
margin-bottom:10px;
text-align:center;
}

.subtitle{
font-size:18px;
margin-bottom:20px;
text-align:center;
}

.booking-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

label{
font-size:14px;
opacity:0.8;
margin-bottom:6px;
display:block;
}

input,textarea{
width:100%;
padding:14px 16px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

textarea{
grid-column:span 2;
height:110px;
resize:none;
}

.tour-card{
width:100%;
padding:30px;
border:1px solid rgba(255,255,255,0.3);
border-radius:25px;
text-align:center;
}

.price{
font-size:28px;
font-weight:600;
margin-bottom:25px;
color:#f77f00;
}

.btn-book{
width:100%;
max-width:300px;
padding:14px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,#25D366,#1ebe5d);
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.btn-back{
display:inline-block;
margin-bottom:20px;
padding:10px 20px;
background:rgba(255,255,255,0.15);
color:white;
text-decoration:none;
border-radius:30px;
font-size:14px;
border:1px solid rgba(255,255,255,0.3);
}

.taxi-box{
background:rgba(255,255,255,0.08);
border-radius:12px;
padding:14px;
}

.taxi-option{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.taxi-option input{
width:22px;
height:22px;
accent-color:#25D366;
}

</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">

<a href="index.html" class="btn-back">⬅ Back to Home</a>

<h1>🐠 Book Your Excursion</h1>
<p class="subtitle">Catalina Island & Snorkeling</p>

<form class="booking-form" onsubmit="return false;">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div>
<label>Hotel / Pickup Location</label>
<input type="text" id="hotelInput" placeholder="Hotel / Pickup Location">
</div>

<div>
<label>Adults (9+ years) — $55</label>
<input type="number" id="adults" value="1" min="0">
</div>

<div>
<label>Kids 4-8 years — $45</label>
<input type="number" id="kids" value="0" min="0">
</div>

<div>
<label>Kids 0-3 years — Free</label>
<input type="number" id="babies" value="0" min="0">
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date">
</div>

<div class="taxi-box">

<label>Additional Services</label>

<label class="taxi-option">
<input type="checkbox" id="taxiService">
Taxi Service (Only Bayahibe hotels) + $30 USD
</label>

</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, special requests, room number..."></textarea>
</div>

</form>
</div>

<div class="right-side">

<div class="tour-card">

<h2>Catalina Island & Snorkeling</h2>

<p>
Enjoy crystal-clear waters, snorkeling at the coral reef and a relaxing day on Catalina Island.
</p>

<div class="price">$55 USD</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Deposit via PayPal. Remaining balance paid on excursion day.
</p>

</div>

</div>

</div>

<script>

const adultPrice = 55;
const kidPrice = 45;
const taxiPrice = 30;

const adults = document.getElementById("adults");
const kids = document.getElementById("kids");
const babies = document.getElementById("babies");
const taxiService = document.getElementById("taxiService");

const nameInput = document.getElementById("name");
const hotelInput = document.getElementById("hotelInput");
const dateInput = document.getElementById("date");
const notesInput = document.getElementById("notes");

const priceBox = document.querySelector(".price");

let total = 0;

function updateTotal(){

total =
(adults.value * adultPrice) +
(kids.value * kidPrice);

if(taxiService.checked){
total += taxiPrice;
}

priceBox.innerText = "$" + total + " USD";

}

adults.addEventListener("input",updateTotal);
kids.addEventListener("input",updateTotal);
taxiService.addEventListener("change",updateTotal);

updateTotal();

function sendWhatsApp(){

let taxi = taxiService.checked ? "Yes (+$30)" : "No";

const message=`Hello! I would like to confirm my excursion booking.

Excursion: Catalina Island & Snorkeling
Name: ${nameInput.value}
Hotel: ${hotelInput.value}

Adults: ${adults.value}
Kids: ${kids.value}
Babies: ${babies.value}

Date: ${dateInput.value}

Taxi Service: ${taxi}

Total Price: $${total} USD

Notes: ${notesInput.value}

Deposit via PayPal completed.
Please confirm pickup time.`;

window.open("https://wa.me/18097980816?text="+encodeURIComponent(message),"_blank");

}

</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>

paypal.Buttons({

style:{layout:'vertical',color:'blue',shape:'pill',label:'paypal'},

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{value:'20.00'},
description:'Catalina Island & Snorkeling Deposit'
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(details=>{
alert('Payment completed by '+details.payer.name.given_name);
});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
