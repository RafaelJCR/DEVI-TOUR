<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Catalina Island & Snorkel</title>

<style>
  @media(max-width:992px){
  .booking-container{
    grid-template-columns:1fr;
    padding:40px 25px;
  }

  .booking-form{
    grid-template-columns:1fr;
  }

  textarea{
    grid-column:span 1;
  }
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  background:url("Images/HD-wallpaper-orange-waves-12-background-gradient-iphone-pro-wave-thumbnail.jpg") no-repeat center center/cover;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* CONTENEDOR PRINCIPAL ESTILO BUGGIES */
.booking-container{
  width:95%;
  max-width:1500px;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:80px;
  padding:70px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(14px);
  border-radius:30px;
  box-shadow:0 40px 90px rgba(0,0,0,0.5);
  color:white;
}

/* LADO IZQUIERDO */
.left-side h1{
  font-size:38px;
  font-weight:300;
  margin-bottom:15px;
}

.subtitle{
  opacity:0.8;
  margin-bottom:50px;
}

.booking-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

label{
  font-size:14px;
  opacity:0.8;
  margin-bottom:6px;
  display:block;
}

input,select,textarea{
  width:100%;
  padding:12px 5px;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.4);
  background:transparent;
  color:white;
  font-size:15px;
}

input::placeholder,
textarea::placeholder{
  color:rgba(255,255,255,0.6);
}

input:focus,select:focus,textarea:focus{
  outline:none;
  border-bottom:1px solid white;
}

textarea{
  grid-column:span 2;
  height:100px;
  resize:none;
}

/* LADO DERECHO */
.right-side{
  display:flex;
  align-items:center;
}

.tour-card{
  width:100%;
  padding:40px;
  border:1px solid rgba(255,255,255,0.3);
  border-radius:25px;
  backdrop-filter:blur(12px);
}

.tour-card h2{
  margin-bottom:20px;
  font-weight:400;
}

.tour-card p{
  font-size:14px;
  line-height:1.6;
  opacity:0.85;
  margin-bottom:25px;
}

.price{
  font-size:30px;
  font-weight:600;
  margin-bottom:25px;
}

.btn-book{
  width:100%;
  padding:16px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
  transition:0.3s;
}

.btn-book:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(37,211,102,0.4);
}

.note{
  margin-top:20px;
  font-size:13px;
  opacity:0.7;
}

/* RESPONSIVE */
@media(max-width:992px){
  .booking-container{
    grid-template-columns:1fr;
    padding:40px 25px;
  }

  .booking-form{
    grid-template-columns:1fr;
  }

  textarea{
    grid-column:span 1;
  }
}
</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">
<h1>🌊 Book Your Excursion</h1>
<p class="subtitle">Catalina Island & Snorkel</p>

<form class="booking-form" onsubmit="return false;">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe" required>
</div>

<div>
<label>Hotel / Accommodation</label>
<input type="text" id="hotelInput" placeholder="Your hotel" required>
</div>

<div>
<label>Number of People</label>
<select id="people" required>
<option value="">Select</option>
<option>1 Person</option>
<option>2 People</option>
<option>3 People</option>
<option>4 People</option>
<option>5+ People</option>
</select>
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date" required>
</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, snorkeling experience, special requests..."></textarea>
</div>

</form>
</div>

<div class="right-side">
<div class="tour-card">

<h2>Catalina Island & Snorkel</h2>

<p>
Enjoy crystal-clear waters, white sand beaches and an unforgettable Caribbean snorkeling experience in La Romana.
</p>

<div class="price">$55.00 USD</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Deposit via PayPal. Remaining balance paid on excursion day.
</p>

</div>
</div>

</div>

<script>
function sendWhatsApp() {
  const message = `
Hello! I would like to confirm my excursion booking.

📍 Catalina Island & Snorkel
👤 Name: ${name.value}
🏨 Hotel: ${hotelInput.value}
👥 People: ${people.value}
📅 Date: ${date.value}
📝 Notes: ${notes.value}

💰 Deposit via PayPal completed.
Please confirm pickup time.
`;

  window.open(
    "https://wa.me/18097980816?text=" + encodeURIComponent(message),
    "_blank"
  );
}
</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>
paypal.Buttons({

style:{
  layout:'vertical',
  color:'blue',
  shape:'pill',
  label:'paypal'
},

createOrder: function(data, actions){
return actions.order.create({
purchase_units:[{
amount:{ value:'20.00' },
description:'Catalina Island & Snorkel Deposit'
}]
});
},

onApprove: function(data, actions){
return actions.order.capture().then(function(details){
alert('Payment completed by ' + details.payer.name.given_name);
});
}

}).render('#paypal-button-container');
</script>

</body>
</html>
