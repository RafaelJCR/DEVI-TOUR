<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Catalina Island & Snorkeling</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url("https://res.cloudinary.com/simpleview/image/upload/v1548270991/clients/catalinaislandccvb/TwoBoysSnorkeling_22c65f85-64d1-445d-9afc-e06fb9e7a7d8.jpg") no-repeat center/cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* CONTAINER */
.booking-container{
width:100%;
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:50px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
color:white;
}

/* TEXT */
.left-side,.right-side{width:100%;}

.left-side h1{
font-size:clamp(24px,4vw,36px);
font-weight:300;
margin-bottom:10px;
text-align:center;
}

.subtitle{
font-size:clamp(14px,2vw,18px);
margin-bottom:20px;
text-align:center;
}

/* FORM */
.booking-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-size:13px;
opacity:0.8;
margin-bottom:6px;
display:block;
}

input,textarea{
width:100%;
padding:12px 14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
outline:none;
}

textarea{
grid-column:span 2;
height:100px;
resize:none;
}

/* TAXI */
.taxi-box{
grid-column:span 2;
background:rgba(255,255,255,0.08);
border-radius:10px;
padding:12px;
}

.taxi-option{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
font-size:13px;
}

.taxi-option input{
width:20px;
height:20px;
accent-color:#25D366;
}

/* CARD */
.right-side{
display:flex;
align-items:center;
justify-content:center;
}

.tour-card{
width:100%;
padding:25px 20px;
border:1px solid rgba(255,255,255,0.3);
border-radius:20px;
text-align:center;
}

.price{
font-size:26px;
font-weight:600;
margin-bottom:20px;
color:#f77f00;
}

.btn-book{
width:100%;
max-width:300px;
padding:12px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,#25D366,#1ebe5d);
color:white;
font-size:15px;
cursor:pointer;
margin-top:15px;
}

.note{
margin-top:15px;
font-size:12px;
opacity:0.7;
}

.btn-back{
display:inline-block;
margin-bottom:20px;
padding:8px 16px;
background:rgba(255,255,255,0.15);
color:white;
text-decoration:none;
border-radius:30px;
font-size:13px;
border:1px solid rgba(255,255,255,0.3);
}

/* TABLETS */
@media(max-width:992px){

.booking-container{
grid-template-columns:1fr;
padding:30px;
gap:40px;
}

.booking-form{
grid-template-columns:1fr;
}

textarea{
grid-column:span 1;
}

.taxi-box{
grid-column:span 1;
}

}

/* CELULARES */
@media(max-width:600px){

body{
padding:10px;
}

.booking-container{
padding:20px;
border-radius:20px;
}

.left-side h1{
font-size:22px;
}

.subtitle{
font-size:14px;
}

.price{
font-size:22px;
}

.btn-book{
font-size:14px;
}

.note{
font-size:11px;
}

}

</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">

<a href="index.html" class="btn-back">⬅ Back to Home</a>

<h1>🐠 Book Your Excursion</h1>
<p class="subtitle">Catalina Island & Snorkeling</p>

<form class="booking-form" onsubmit="return false;">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div>
<label>Hotel / Pickup Location</label>
<input type="text" id="hotelInput" placeholder="Hotel / Pickup Location">
</div>

<div>
<label>Adults (9+ years) — $55</label>
<input type="number" id="adults" value="1" min="0">
</div>

<div>
<label>Kids 4-8 years — $45</label>
<input type="number" id="kids" value="0" min="0">
</div>

<div>
<label>Kids 0-3 years — Free</label>
<input type="number" id="babies" value="0" min="0">
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date">
</div>

<div class="taxi-box">

<label>Additional Services</label>

<label class="taxi-option">
<input type="checkbox" id="taxiService">
Taxi Service (Only Bayahibe hotels) + $30 USD
</label>

</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, special requests, room number..."></textarea>
</div>

</form>
</div>

<div class="right-side">

<div class="tour-card">

<h2>Catalina Island & Snorkeling</h2>

<p>
Enjoy crystal-clear waters, snorkeling at the coral reef and a relaxing day on Catalina Island.
</p>

<div class="price">$55 USD</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Full payment via PayPal. Confirmation will be sent shortly.
</p>

</div>

</div>

</div>

<script>

const adultPrice = 55;
const kidPrice = 45;
const taxiPrice = 30;

const adults = document.getElementById("adults");
const kids = document.getElementById("kids");
const babies = document.getElementById("babies");
const taxiService = document.getElementById("taxiService");

const nameInput = document.getElementById("name");
const hotelInput = document.getElementById("hotelInput");
const dateInput = document.getElementById("date");
const notesInput = document.getElementById("notes");

const priceBox = document.querySelector(".price");

let total = 0;

function updateTotal(){

total =
(adults.value * adultPrice) +
(kids.value * kidPrice);

if(taxiService.checked){
total += taxiPrice;
}

priceBox.innerText = "$" + total + " USD";

}

adults.addEventListener("input",updateTotal);
kids.addEventListener("input",updateTotal);
taxiService.addEventListener("change",updateTotal);

updateTotal();

function sendWhatsApp(){

let taxi = taxiService.checked ? "Yes (+$30)" : "No";

const message=`Hello! I would like to confirm my excursion booking.

Excursion: Catalina Island & Snorkeling
Name: ${document.getElementById("name").value}
Hotel: ${document.getElementById("hotelInput").value}
Adults: ${document.getElementById("adults").value}
Kids: ${document.getElementById("kids").value}
Date: ${document.getElementById("date").value}
Total: ${document.querySelector(".price").innerText}
Notes: ${document.getElementById("notes").value}

Payment via PayPal completed.
Please confirm pickup time.`;

window.open("https://wa.me/18097980816?text="+encodeURIComponent(message),"_blank");

}

</script>

<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>

paypal.Buttons({

style:{layout:'vertical',color:'blue',shape:'pill',label:'paypal'},

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{value: document.querySelector(".price").innerText.replace(/[^0-9]/g,'') + '.00'},
description:'Catalina Island & Snorkeling'
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(details=>{
alert('Payment completed by '+details.payer.name.given_name);
});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
