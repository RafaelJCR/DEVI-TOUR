<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Excursion | Catalina Island & Altos de Chavón</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{
background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
url("https://beditour.com/wp-content/uploads/2023/11/3-1-scaled-e1701017731754.jpg") no-repeat center center/cover;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* CONTAINER */
.booking-container{
width:100%;
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:50px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border-radius:30px;
box-shadow:0 30px 60px rgba(0,0,0,0.5);
color:white;
align-items:center;
justify-items:center;
}

.left-side,.right-side{width:100%;}

/* TEXT */
.left-side h1{
font-size:clamp(24px,4vw,36px);
font-weight:300;
margin-bottom:10px;
text-align:center;
}

.subtitle{
font-size:clamp(14px,2vw,18px);
margin-bottom:20px;
text-align:center;
}

/* FORM */
.booking-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
font-size:13px;
opacity:0.8;
margin-bottom:6px;
display:block;
}

input,textarea{
width:100%;
padding:12px 14px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.08);
color:white;
font-size:14px;
outline:none;
}

textarea{
grid-column:span 2;
height:100px;
resize:none;
}

/* TAXI */
.taxi-box{
grid-column:span 2;
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:10px;
}

.taxi-option{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
font-size:13px;
}

/* CARD */
.tour-card{
width:100%;
padding:25px 20px;
border:1px solid rgba(255,255,255,0.3);
border-radius:20px;
text-align:center;
}

.price{
font-size:26px;
font-weight:600;
margin-bottom:20px;
color:#f77f00;
}

.btn-book{
width:100%;
max-width:300px;
padding:12px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,#25D366,#1ebe5d);
color:white;
font-size:15px;
cursor:pointer;
margin-top:15px;
}

.note{
margin-top:15px;
font-size:12px;
opacity:0.7;
}

.btn-back{
display:inline-block;
margin-bottom:20px;
padding:8px 16px;
background:rgba(255,255,255,0.15);
color:white;
text-decoration:none;
border-radius:30px;
font-size:13px;
border:1px solid rgba(255,255,255,0.3);
}

/* TABLETS */
@media(max-width:992px){

.booking-container{
grid-template-columns:1fr;
padding:30px;
gap:40px;
}

.booking-form{
grid-template-columns:1fr;
}

textarea{
grid-column:span 1;
}

.taxi-box{
grid-column:span 1;
}

}

/* CELULARES */
@media(max-width:600px){

body{
padding:10px;
}

.booking-container{
padding:20px;
border-radius:20px;
}

.left-side h1{
font-size:22px;
}

.subtitle{
font-size:14px;
}

.price{
font-size:22px;
}

.btn-book{
font-size:14px;
}

.note{
font-size:11px;
}

}

</style>
</head>

<body>

<div class="booking-container">

<div class="left-side">

<a href="index.html" class="btn-back">⬅ Back to Home</a>

<h1>📍 Book Your Excursion</h1>
<p class="subtitle">Catalina Island & Altos de Chavón</p>

<form class="booking-form" onsubmit="return false;">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="John Doe">
</div>

<div>
<label>Hotel / Pickup Location</label>
<input type="text" id="hotelInput" placeholder="Hotel">
</div>

<div>
<label>Adults (9+) $155</label>
<input type="number" id="adults" value="1" min="1" oninput="updateTotal()">
</div>

<div>
<label>Children (0-8) $95</label>
<input type="number" id="children" value="0" min="0" oninput="updateTotal()">
</div>

<div>
<label>Excursion Date</label>
<input type="date" id="date">
</div>

<div class="taxi-box">

<label>Additional Services</label>

<label class="taxi-option">
<input type="checkbox" id="taxiService" onchange="updateTotal()">
Taxi Service (Hotels outside Punta Cana) + $30 USD
</label>

</div>

<div>
<label>Additional Information</label>
<textarea id="notes" placeholder="Kids, special requests, room number..."></textarea>
</div>

</form>

</div>

<div class="right-side">

<div class="tour-card">

<h2>Catalina Island & Altos de Chavón</h2>

<p>Snorkeling adventure, Caribbean beaches and a cultural visit to Altos de Chavón village.</p>

<div class="price">$155 USD</div>

<div id="paypal-button-container"></div>

<button class="btn-book" onclick="sendWhatsApp()">
Confirm Reservation via WhatsApp
</button>

<p class="note">
Deposit via PayPal. Remaining balance paid on excursion day.
</p>

</div>

</div>

</div>

<script>

const adultPrice=155;
const childPrice=95;
const taxiPrice=30;

const adultsInput=document.getElementById("adults");
const childrenInput=document.getElementById("children");
const taxiService=document.getElementById("taxiService");

const priceBox=document.querySelector(".price");

let total=0;

function updateTotal(){

let adults=parseInt(adultsInput.value)||0;
let children=parseInt(childrenInput.value)||0;

total=(adults*adultPrice)+(children*childPrice);

if(taxiService.checked){
total+=taxiPrice;
}

priceBox.innerText="$"+total+" USD";

}

updateTotal();

function sendWhatsApp(){

let taxi=taxiService.checked ? "Yes (+$30)" : "No";

const message=`Hello! I would like to confirm my Catalina Island & Altos de Chavón booking.

Name: ${name.value}

Hotel: ${hotelInput.value}

Adults: ${adultsInput.value}
Children: ${childrenInput.value}

Taxi Service: ${taxi}

Date: ${date.value}

Total Price: $${total} USD

Notes: ${notes.value}

Deposit via PayPal completed. Please confirm pickup time.`;

window.open("https://wa.me/18097980816?text="+encodeURIComponent(message),"_blank");

}

</script>

<!-- ✅ PAYPAL CORREGIDO -->
<script src="https://www.paypal.com/sdk/js?client-id=ATLdzC_wHDk-XsAD_Ht1IEoSv-npdcIcLnFNM2hMoL01UgfzxHcrEEgRPno5_njFJmF6dMfgmzxSGra0&currency=USD"></script>

<script>

if (typeof paypal === "undefined") {
console.error("PayPal SDK not loaded");
}

paypal.Buttons({

style:{layout:'vertical',color:'blue',shape:'pill',label:'paypal'},

createOrder:function(data,actions){
return actions.order.create({
purchase_units:[{
amount:{value:'20.00'},
description:'Catalina Island & Altos de Chavón Deposit'
}]
});
},

onApprove:function(data,actions){
return actions.order.capture().then(details=>{
alert('Payment completed by '+details.payer.name.given_name);
});
}

}).render('#paypal-button-container');

</script>

</body>
</html>
